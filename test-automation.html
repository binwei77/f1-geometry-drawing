<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>F1自动化测试</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        #log { background: #f5f5f5; padding: 10px; border: 1px solid #ccc; max-height: 500px; overflow-y: auto; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>F1几何绘图项目自动化测试</h1>
    <button onclick="runTests()">运行所有测试</button>
    <button onclick="clearLog()">清空日志</button>
    <button onclick="stopTests()">停止测试</button>
    <div id="log"></div>

    <script>
        let stopFlag = false;
        let testDelay = 1500; // 每个测试之间的延迟（毫秒）

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function stopTests() {
            stopFlag = true;
            log('测试已停止', 'error');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function executeCommand(command) {
            if (stopFlag) return false;
            
            const input = document.getElementById('commandInput');
            if (!input) {
                log(`错误：找不到输入框`, 'error');
                return false;
            }
            
            input.value = command;
            log(`执行命令: ${command}`, 'info');
            
            // 触发input事件
            input.dispatchEvent(new Event('input', { bubbles: true }));
            
            // 模拟按Enter键
            const event = new KeyboardEvent('keydown', {
                key: 'Enter',
                code: 'Enter',
                keyCode: 13,
                bubbles: true
            });
            input.dispatchEvent(event);
            
            await sleep(testDelay);
            return true;
        }

        async function runTests() {
            stopFlag = false;
            log('开始测试...', 'info');
            
            // 测试1：绘制矩形
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            log('✓ 测试1：绘制矩形 - 通过', 'success');
            
            // 测试2：绘制三角形
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('三角形abc')) return;
            log('✓ 测试2：绘制三角形 - 通过', 'success');
            
            // 测试3：创建中点
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('中点 a b e')) return;
            log('✓ 测试3：创建中点 - 通过', 'success');
            
            // 测试4：使用中点绘制圆
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('中点 a b e')) return;
            if (!await executeCommand('圆 e ab')) return;
            log('✓ 测试4：使用中点绘制圆 - 通过', 'success');
            
            // 测试5：创建1/3分点
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('分点 a b f 1/3')) return;
            log('✓ 测试5：创建1/3分点 - 通过', 'success');
            
            // 测试6：旋转功能
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('旋转 矩形abcd 绕a 90')) return;
            log('✓ 测试6：旋转功能 - 通过', 'success');
            
            // 测试7：对称功能
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('对称 矩形abcd 关于直线ac')) return;
            log('✓ 测试7：对称功能 - 通过', 'success');
            
            // 测试8：平移功能
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('中点 a b e')) return;
            if (!await executeCommand('平移 矩形abcd 使a到e')) return;
            log('✓ 测试8：平移功能 - 通过', 'success');
            
            // 测试9：坐标系
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('坐标系')) return;
            log('✓ 测试9：坐标系 - 通过', 'success');
            
            // 测试10：正比例函数
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('坐标系')) return;
            if (!await executeCommand('正比例 1')) return;
            log('✓ 测试10：正比例函数 - 通过', 'success');
            
            // 测试11：反比例函数
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('坐标系')) return;
            if (!await executeCommand('反比例 1')) return;
            log('✓ 测试11：反比例函数 - 通过', 'success');
            
            // 测试12：二次函数
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('坐标系')) return;
            if (!await executeCommand('二次函数 1 0 0')) return;
            log('✓ 测试12：二次函数 - 通过', 'success');
            
            // 测试13：颜色控制
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('颜色为红')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('颜色为蓝')) return;
            if (!await executeCommand('三角形abc')) return;
            log('✓ 测试13：颜色控制 - 通过', 'success');
            
            // 测试14：填充功能
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd 填充')) return;
            log('✓ 测试14：填充功能 - 通过', 'success');
            
            // 测试15：撤销功能
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('矩形abcd')) return;
            if (!await executeCommand('三角形abc')) return;
            await sleep(500);
            document.getElementById('undoBtn').click();
            await sleep(testDelay);
            log('✓ 测试15：撤销功能 - 通过', 'success');
            
            // 测试16：重做功能
            await sleep(500);
            document.getElementById('redoBtn').click();
            await sleep(testDelay);
            log('✓ 测试16：重做功能 - 通过', 'success');
            
            // 测试17：清空画布
            if (!await executeCommand('清空')) return;
            log('✓ 测试17：清空画布 - 通过', 'success');
            
            // 测试18：复合图形
            if (!await executeCommand('清空')) return;
            if (!await executeCommand('颜色为红；矩形abcd 填充；颜色为蓝；圆O 50；颜色为绿；三角形abc')) return;
            log('✓ 测试18：复合图形 - 通过', 'success');
            
            log('所有测试完成！', 'success');
        }
    </script>
</body>
</html>
